<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe — Emoji Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0d0f;--surface:#17171a;--border:#2a2a30;
  --text:#f0f0f0;--muted:#555;--accent:#7c6aff;--accent2:#ff6a9b;
  --bubble-me:#1e1b3a;--bubble-them:#1a1a1f;
}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
.header-left{display:flex;align-items:center;gap:12px;}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;}
.contact-info h2{font-size:14px;font-weight:600;}
.contact-info p{font-size:11px;color:var(--muted);}
.logo{font-size:20px;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
#chat::-webkit-scrollbar{width:3px;}
#chat::-webkit-scrollbar-thumb{background:var(--border);}
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);text-align:center;padding:40px;}
#empty .big{font-size:56px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#empty h2{font-size:20px;font-weight:600;color:var(--text);}
#empty p{font-size:12px;line-height:1.8;max-width:280px;}
.msg-row{display:flex;flex-direction:column;animation:popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes popIn{from{opacity:0;transform:scale(0.75) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.msg-row.me{align-items:flex-end;}
.msg-row.them{align-items:flex-start;}
.msg-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;padding:0 6px;}
.bubble{max-width:72%;border-radius:18px;padding:14px 20px;position:relative;cursor:default;transition:transform 0.15s;}
.bubble:hover{transform:scale(1.04);}
.msg-row.me .bubble{background:var(--bubble-me);border:1px solid rgba(124,106,255,0.35);border-bottom-right-radius:4px;}
.msg-row.them .bubble{background:var(--bubble-them);border:1px solid var(--border);border-bottom-left-radius:4px;}
.emoji-display{font-size:34px;line-height:1.4;letter-spacing:3px;text-align:center;}
.original-text{display:none;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--accent);border-radius:10px;padding:8px 14px;font-size:12px;color:var(--text);white-space:nowrap;z-index:10;pointer-events:none;box-shadow:0 4px 24px rgba(124,106,255,0.25);}
.original-text::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--accent);}
.bubble:hover .original-text{display:block;}
.msg-meta{display:flex;align-items:center;gap:8px;margin-top:5px;padding:0 6px;}
.msg-time{font-size:9px;color:var(--muted);}
.destruct-label{font-size:9px;color:var(--muted);}
.timer-bar{height:2px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}
.timer-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition-property:width;transition-timing-function:linear;}
@keyframes burnAway{0%{opacity:1;filter:none;transform:scale(1) translateY(0);}30%{filter:brightness(1.8) sepia(0.8) hue-rotate(-20deg);transform:scale(1.06);}60%{opacity:0.6;filter:brightness(3) blur(2px);transform:scale(0.85) translateY(-15px);}100%{opacity:0;filter:blur(10px) brightness(4);transform:scale(0.2) translateY(-40px);}}
@keyframes shatter{0%{opacity:1;transform:scale(1) rotate(0);}15%{transform:scale(1.12) rotate(1deg);}35%{transform:scale(0.9) rotate(-3deg);filter:brightness(1.4);}55%{transform:scale(1.06) rotate(4deg);opacity:0.7;}75%{transform:scale(0.4) rotate(-8deg);opacity:0.3;filter:blur(4px);}100%{transform:scale(0) rotate(15deg);opacity:0;filter:blur(12px);}}
@keyframes dissolve{0%{opacity:1;filter:none;transform:scale(1);}25%{filter:blur(1px);opacity:0.85;}55%{filter:blur(5px);opacity:0.45;transform:scale(1.08);}100%{filter:blur(16px);opacity:0;transform:scale(1.25);}}
.burn{animation:burnAway 1s ease-in forwards;}
.shatter{animation:shatter 0.85s ease-in forwards;}
.dissolve{animation:dissolve 1.1s ease-in forwards;}
.thinking-bubble{background:var(--bubble-me);border:1px solid rgba(124,106,255,0.3);border-radius:18px;border-bottom-right-radius:4px;padding:16px 22px;align-self:flex-end;}
.thinking-dots{display:flex;gap:5px;align-items:center;}
.thinking-dots span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:tdot 1.2s infinite;}
.thinking-dots span:nth-child(2){animation-delay:0.2s;}
.thinking-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
#input-area{padding:14px 20px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:12px;align-items:center;}
#inp{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:24px;padding:12px 20px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
#inp:focus{border-color:var(--accent);}
#inp::placeholder{color:var(--muted);}
#send-btn{width:46px;height:46px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;font-size:20px;transition:transform 0.15s,opacity 0.2s;}
#send-btn:hover{transform:scale(1.1);}
#send-btn:disabled{opacity:0.35;transform:none;cursor:not-allowed;}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="avatar">✨</div>
    <div class="contact-info">
      <h2>Vibe Chat</h2>
      <p>Words → emojis. Even you won't know.</p>
    </div>
  </div>
  <div class="logo">vibe</div>
</header>
<div id="chat">
  <div id="empty">
    <div class="big">🌀</div>
    <h2>Say anything.</h2>
    <p>Type a message and hit send. Your words turn into emojis — hover any bubble to peek at the original. Messages self-destruct in 10 seconds.</p>
  </div>
</div>
<div id="input-area">
  <input id="inp" type="text" placeholder="Say something..." autocomplete="off" spellcheck="false">
  <button id="send-btn" onclick="sendMessage()">→</button>
</div>
<script>
const chat = document.getElementById('chat');
const inp  = document.getElementById('inp');
const sendBtn = document.getElementById('send-btn');
let empty = document.getElementById('empty');
let msgCount = 0;
const effects = ['burn','shatter','dissolve'];

inp.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});

async function translateToEmoji(text){
  const res = await fetch('/api/translate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });
  const data = await res.json();
  return data.emojis || '✨💫🌀';
}

function hideEmpty(){
  if(empty){ empty.style.display='none'; empty=null; }
}

function addBubble(originalText, emojiText, side, delay=10000){
  hideEmpty();
  const now  = new Date();
  const time = now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const row  = document.createElement('div');
  row.className = `msg-row ${side}`;
  row.style.maxHeight = '300px';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = side==='me' ? 'you' : 'them';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const tooltip = document.createElement('div');
  tooltip.className = 'original-text';
  tooltip.textContent = `"${originalText}"`;

  const display = document.createElement('div');
  display.className = 'emoji-display';
  display.textContent = emojiText;

  bubble.appendChild(tooltip);
  bubble.appendChild(display);

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = time;
  const dlabel = document.createElement('div');
  dlabel.className = 'destruct-label';
  dlabel.textContent = '💣 10s';
  meta.appendChild(timeEl);
  meta.appendChild(dlabel);

  const timerBar = document.createElement('div');
  timerBar.className = 'timer-bar';
  const fill = document.createElement('div');
  fill.className = 'timer-fill';
  fill.style.width = '100%';
  timerBar.appendChild(fill);

  row.appendChild(label);
  row.appendChild(bubble);
  row.appendChild(meta);
  row.appendChild(timerBar);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(()=>{ fill.style.transitionDuration=(delay-400)+'ms'; fill.style.width='0%'; },400);

  let secs = Math.round(delay/1000);
  const cd = setInterval(()=>{ secs--; if(secs<=0){clearInterval(cd);return;} dlabel.textContent=`💣 ${secs}s`; },1000);

  setTimeout(()=>{
    clearInterval(cd);
    const fx = effects[Math.floor(Math.random()*3)];
    const names={burn:'🔥 burning…',shatter:'💥 shattering…',dissolve:'🌫️ dissolving…'};
    dlabel.textContent = names[fx];
    display.classList.add(fx);
    setTimeout(()=>{
      row.style.transition='opacity 0.3s,transform 0.3s,max-height 0.5s,margin 0.5s';
      row.style.opacity='0'; row.style.transform='scale(0.85)';
      row.style.maxHeight='0'; row.style.marginBottom='0'; row.style.overflow='hidden';
      setTimeout(()=>row.remove(),500);
    },1000);
  },delay);
}

function addThinking(side='me'){
  hideEmpty();
  const row = document.createElement('div');
  row.className = `msg-row ${side}`;
  const bubble = document.createElement('div');
  bubble.className = 'thinking-bubble';
  if(side==='them'){ bubble.style.alignSelf='flex-start'; bubble.style.borderBottomRightRadius='18px'; bubble.style.borderBottomLeftRadius='4px'; bubble.style.background='var(--bubble-them)'; bubble.style.border='1px solid var(--border)'; }
  bubble.innerHTML='<div class="thinking-dots"><span></span><span></span><span></span></div>';
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

const autoReplies = [
  "I totally get you","That made my day","No way same here",
  "I'm screaming right now","Okay but why does this hit so hard",
  "This is sending me","I needed to see this","You always know",
  "Can't believe it either","I'm dead this is too much",
  "Literally me every day","Wait what how","I feel seen right now",
  "This is exactly it","My heart actually"
];

async function sendMessage(){
  const text = inp.value.trim();
  if(!text || sendBtn.disabled) return;
  inp.value='';
  sendBtn.disabled=true;

  const thinkRow = addThinking('me');
  try {
    const emojis = await translateToEmoji(text);
    thinkRow.remove();
    addBubble(text, emojis, 'me', 10000);
    msgCount++;

    if(msgCount % 2 === 0){
      setTimeout(async()=>{
        const reply = autoReplies[Math.floor(Math.random()*autoReplies.length)];
        const thinkThem = addThinking('them');
        try {
          const replyEmoji = await translateToEmoji(reply);
          thinkThem.remove();
          addBubble(reply, replyEmoji, 'them', 13000);
        } catch { thinkThem.remove(); }
      }, 1500 + Math.random()*1500);
    }
  } catch(err) {
    thinkRow.remove();
    const errRow = document.createElement('div');
    errRow.className='msg-row me';
    const errB = document.createElement('div');
    errB.className='bubble';
    errB.style.color='#ff6a9b';
    errB.style.fontSize='13px';
    errB.textContent='⚠️ Could not connect. Check your Vercel deployment.';
    errRow.appendChild(errB);
    chat.appendChild(errRow);
    setTimeout(()=>errRow.remove(),4000);
  }
  sendBtn.disabled=false;
  inp.focus();
}
</script>
</body>
  </html>
